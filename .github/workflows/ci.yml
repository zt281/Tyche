name: Tyche Integration CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Build C++ Core
        run: |
          cd core/cpp
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          ctest --test-dir build --output-on-failure

      - name: Install Python Core
        run: |
          cd core/python
          pip install -e ".[dev]"

      - name: Install Static Data Module
        run: |
          cd modules/static-data
          pip install -e ".[dev]"

      - name: Build CTP Gateway
        run: |
          cd modules/ctp-gateway-cpp
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DCTP_USE_SUBMODULE=ON
          cmake --build build --config Release

      - name: Run Python tests
        run: |
          pytest core/python/tests/ -v
          pytest modules/static-data/tests/ -v

      - name: Run C++ tests
        run: |
          ctest --test-dir core/cpp/build --output-on-failure
          ctest --test-dir modules/ctp-gateway-cpp/build --output-on-failure

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs consistency
        run: |
          echo "Checking documentation structure..."
          ls -la docs/
          ls -la docs/protocol/ || true
          ls -la docs/sdk/ || true
name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build and run C++ tests
        run: |
          cmake -B build -S . -DTYCHE_BUILD_LIBZMQ=ON
          cmake --build build --config Release --target tyche_tests --target ctp_gateway_tests
          ctest --test-dir build -C Release --output-on-failure

  cpp-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov libzmq3-dev
      - name: Configure with coverage
        run: |
          cmake -B build -S . \
            -DTYCHE_BUILD_LIBZMQ=OFF \
            -DTYCHE_ENABLE_COVERAGE=ON \
            -DCMAKE_BUILD_TYPE=Debug
      - name: Build tests
        run: cmake --build build --config Debug --target tyche_tests
      - name: Run tests with coverage
        run: |
          cd build
          executables/linux/tyche_tests --gtest_filter='-AdaptiveSpinTest.SpinPhase:FastClockTest.*:EngineTest.DestructorStopsIfRunning:EngineTest.StopIdempotent:EngineTest.ShmBridgeAfterStart:EngineIntegrationTest.*:ObjectPoolTest.MultiThreadedStressTest:RcuSnapshotTest.StressTest10MOperations'
      - name: Collect coverage
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info --ignore-errors mismatch,negative,gcov
          lcov --remove coverage.info '/usr/*' '*/third_party/*' '*/tests/*' --output-file coverage.info --ignore-errors mismatch,negative,gcov
          genhtml coverage.info --output-directory coverage_report --ignore-errors mismatch,negative
      - name: Check coverage threshold
        run: |
          cd build
          LINE_PCT=$(lcov --summary coverage.info | grep 'lines' | grep -oP '\d+\.?\d*' | head -1)
          echo "Line coverage: ${LINE_PCT}%"
          python3 -c "import sys; pct=float('${LINE_PCT}'); sys.exit(0 if pct>=30 else 1)" || {
            echo "ERROR: Coverage ${LINE_PCT}% is below threshold 30%"
            exit 1
          }
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: cpp-coverage-report
          path: build/coverage_report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build/coverage.info
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

